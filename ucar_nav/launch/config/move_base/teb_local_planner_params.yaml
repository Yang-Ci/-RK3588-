TebLocalPlannerROS:

#  odom_topic: odometry/filtered
 odom_topic: odom
    
 # Trajectory
  
 teb_autosize: True
 dt_ref: 0.25
 dt_hysteresis: 0.1
 max_samples: 500
 global_plan_overwrite_orientation: True
 allow_init_with_backwards_motion: False
 max_global_plan_lookahead_dist: 0.5   #向前规划最长距离 #太大路径不平滑，太小避障和转弯时效果不好，太小还会导致小车不敢走
 global_plan_viapoint_sep: -1
 global_plan_prune_distance: 1
 exact_arc_length: False
 feasibility_check_no_poses: 2
 publish_feedback: True
    
 # Robot
         
 max_vel_x: 1 #1.2 
 max_vel_x_backwards: 1 #1.2
 max_vel_y: 1  #1.5 0.9
 max_vel_theta: 0.8 # 1.0  the angular velocity is also bounded by min_turning_radius in case of a carlike robot (r = v / omega)
 acc_lim_x: 1 #0.6  0.75  0.8
 acc_lim_theta: 1 #0.6   0.75

 # ********************** Carlike robot parameters ********************
 min_turning_radius: 0       # Min turning radius of the carlike robot (compute value using a model or adjust with rqt_reconfigure manually)
 cmd_angle_instead_rotvel: False # stage simulator takes the angle instead of the rotvel as input (twist message)
 # ********************************************************************

#  footprint_model: # types: "point", "circular", "two_circles", "line", "polygon"
#    type: "point"
#    line_start: [-0.17, 0.0] # for type "line"
#    line_end: [0.17, 0.0] # for type "line"
 footprint_model:
    type: "polygon"
    vertices:
      - [-0.154, -0.129]
      - [-0.153, 0.133]
      - [0.194, 0.130]
      - [0.193, -0.130]
    # vertices:
    #   - [-0.163, -0.138]
    #   - [-0.163, 0.138]
    #   - [0.201, 0.138]
    #   - [0.201, -0.138]

# footprint: [[0.171, -0.128], [0.171, 0.128],[-0.171, 0.128], [-0.171, -0.128]]
 # GoalTolerance
    
 xy_goal_tolerance: 0.05
 yaw_goal_tolerance: 0.1 #0.2!!!
 free_goal_vel: False
 complete_global_plan: True
    
 # Obstacles
    
# min_obstacle_dist: 0.05 # This value must also include our robot's expansion, since footprint_model is set to "line".
 min_obstacle_dist: 0.05
#  与障碍的最小期望距离
 inflation_dist: 0.1 # 0.6
#  障碍物周围缓冲区
 include_costmap_obstacles: True
 costmap_obstacles_behind_robot_dist: 0.5
 obstacle_poses_affected: 10  #15

 dynamic_obstacle_inflation_dist: 0.6
 include_dynamic_obstacles: True 

#  costmap_converter_plugin: "costmap_converter::CostmapToLinesDBSMCCH"
 costmap_converter_plugin: ""
 costmap_converter_spin_thread: True
 costmap_converter_rate: 5

 # Optimization
    
 no_inner_iterations: 4
 no_outer_iterations: 3
 optimization_activate: True
 optimization_verbose: False
 penalty_epsilon: 0.08
 obstacle_cost_exponent: 5
 weight_max_vel_x: 1.2 
 weight_max_vel_theta: 1.5
 weight_acc_lim_x: 1   #0.8
 weight_acc_lim_theta: 1  #1
 weight_kinematics_nh: 0.5
 weight_kinematics_forward_drive: 180   #100
 weight_kinematics_turning_radius: 1.0  #1.0
 weight_optimaltime: 1.1 # must be > 0根据转换/执行时间对轨迹进行收缩的优化权重 很重要的一个参数，值越大小车越大胆，转弯切内道，越容易拉到最大速度，也撞死得越快
 weight_shortest_path: 0.7    #0.5
 weight_obstacle: 50   #100   10!!!
 weight_inflation: 1.0   #0.8
 weight_dynamic_obstacle: 10 # not in use yet
 weight_dynamic_obstacle_inflation: 0.2
 weight_viapoint: 1.0  #0.5!!!
 weight_adapt_factor: 2

 # Homotopy Class Planner
 enable_homotopy_class_planning: true   #false!!!
 enable_multithreading: True
 max_number_classes: 4
 selection_cost_hysteresis: 0.5   #1.0!!!
 selection_prefer_initial_plan: 0.95  
 selection_obst_cost_scale: 1.0 
 selection_alternative_time_cost: False

 roadmap_graph_no_samples: 15
 roadmap_graph_area_width: 5
 roadmap_graph_area_length_scale: 1.0
 h_signature_prescaler: 0.5
 h_signature_threshold: 0.1
 obstacle_heading_threshold: 0.45
 switching_blocking_period: 0.0
 viapoints_all_candidates: True
 delete_detours_backwards: True
 max_ratio_detours_duration_best_duration: 3.0
 visualize_hc_graph: False
 visualize_with_time_as_z_axis_scale: False

# Recovery
 
 shrink_horizon_backup: True
 shrink_horizon_min_duration: 10
 oscillation_recovery: true  #baidong  huifu false!!!
 oscillation_v_eps: 0.1
 oscillation_omega_eps: 0.1
 oscillation_recovery_min_duration: 10
 oscillation_filter_duration: 10
