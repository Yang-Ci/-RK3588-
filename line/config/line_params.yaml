# PID 控制器参数
pid:
  kp: 0.1  # 比例增益，主要影响转向响应速度和误差纠正能力
  ki: 0.0   # 积分增益，用于消除长期静态误差
  kd: 0.0   # 微分增益，用于抑制震荡，提高稳定性

# 速度参数
speed:
  linear: 0.3           # 小车前进的线速度 (m/s)
  angular_max: 1.0      # 小车最大的角速度 (rad/s)

# 障碍物检测参数
obstacle:
  pixel_threshold: 2000 # 识别为障碍物的最小像素点数量阈值

# 图像处理参数 (示例，如果后续需要更精细的颜色阈值，可以加在这里)
# color_thresholds:
#   lower_black_h: 0
#   lower_black_s: 0
#   lower_black_v: 0
#   upper_black_h: 180
#   upper_black_s: 255
#   upper_black_v: 50
#   lower_yellow_h: 26
#   lower_yellow_s: 43
#   lower_yellow_v: 46
#   upper_yellow_h: 34
#   upper_yellow_s: 255
#   upper_yellow_v: 255

# 避障动作持续时间 (秒)
avoidance:
  turn_duration: 1.5    # 避障时每次转弯的持续时间
  forward_duration: 1.5 # 避障时向前直行的持续时间